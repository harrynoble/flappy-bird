<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLAPPY BIRD - 8-BIT ARCADE</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;touch-action:none;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
    background:#000;display:flex;justify-content:center;align-items:center}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;
    cursor:pointer;position:fixed;top:0;left:0;width:100vw;height:100vh}
  #themeBtn{position:fixed;top:max(10px,env(safe-area-inset-top,10px));
    right:max(10px,env(safe-area-inset-right,10px));z-index:50;
    width:44px;height:44px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.4);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all 0.3s;padding:0}
  #themeBtn:hover{border-color:rgba(255,255,255,0.6);background:rgba(0,0,0,0.6)}
  #themeBtn:active{transform:scale(0.9)}
  #themeBtn svg{width:22px;height:22px}
</style>
</head>
<body>
<button id="themeBtn" aria-label="Toggle theme" onclick="event.stopPropagation();toggleTheme()">
  <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="#ffd740" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="#aac4e8" stroke-width="2" stroke-linecap="round" style="display:none">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>
<canvas id="game"></canvas>
<script>
// =============================================================
//  FLAPPY BIRD — 8-BIT ARCADE
// =============================================================

let IW,IH,GROUND_H,PLAY_H,PIPE_W,GAP_SIZE,PIPE_SPEED;
let SPAWN_RATE,GRAV,JVEL,BIRD_W,BIRD_H,BIRD_X;
let isPortrait=false;

function calcLayout(){
  const vw=window.innerWidth,vh=window.innerHeight;
  isPortrait=vh>vw*1.1;
  if(isPortrait){
    IW=216;IH=384;GROUND_H=26;PLAY_H=IH-GROUND_H;
    PIPE_W=24;GAP_SIZE=72;PIPE_SPEED=1.1;SPAWN_RATE=150;
    GRAV=0.16;JVEL=-2.8;BIRD_W=16;BIRD_H=12;BIRD_X=55;
  }else{
    IW=480;IH=270;GROUND_H=30;PLAY_H=IH-GROUND_H;
    PIPE_W=34;GAP_SIZE=80;PIPE_SPEED=1.4;SPAWN_RATE=100;
    GRAV=0.19;JVEL=-3.2;BIRD_W=18;BIRD_H=14;BIRD_X=90;
  }
}

const buf=document.createElement('canvas');
const ctx=buf.getContext('2d');
const disp=document.getElementById('game');
const dCtx=disp.getContext('2d');

function applySize(){
  calcLayout();buf.width=IW;buf.height=IH;
  disp.width=IW;disp.height=IH;
  ctx.imageSmoothingEnabled=false;dCtx.imageSmoothingEnabled=false;
  initBgData();
}
function resize(){
  const oldP=isPortrait;const vw=window.innerWidth,vh=window.innerHeight;
  if((vh>vw*1.1)!==oldP||!buf.width)applySize();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,150));

// =============================================================
//  5 BIRD CHARACTERS — each with unique pixel-art draw function
// =============================================================

/** Helper: fill a pixel at bird-local coords */
function px(bx,by,x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(bx+x,by+y,w||1,h||1);}

const BIRDS=[
  // ---- 0: CLASSIC — yellow canary, the original ----
  {
    name:'CLASSIC',trail:'#ffe066',
    draw(bx,by,W,H,t,ff){
      // Body
      ctx.fillStyle='#ffe066';
      ctx.fillRect(bx+1,by+2+t,W-4,H-4);ctx.fillRect(bx+2,by+1+t,W-5,H-2);
      ctx.fillRect(bx+3,by+t,W-7,1);ctx.fillRect(bx+3,by+H-1+t,W-7,1);
      // Belly
      ctx.fillStyle='#f0a830';ctx.fillRect(bx+2,by+H-5+t,W-5,3);
      // Wing
      const wy=ff?-2:1;
      ctx.fillStyle='#e87020';ctx.fillRect(bx,by+Math.floor(H*.35)+wy+t,Math.floor(W*.4),3);
      ctx.fillStyle='#c05818';ctx.fillRect(bx,by+Math.floor(H*.35)+wy+2+t,Math.floor(W*.4),1);
      // Eye
      ctx.fillStyle='#fff';ctx.fillRect(bx+W-6,by+2+t,4,4);ctx.fillRect(bx+W-5,by+1+t,2,1);
      ctx.fillStyle='#111';ctx.fillRect(bx+W-4,by+3+t,2,2);
      ctx.fillStyle='#fff';ctx.fillRect(bx+W-5,by+2+t,1,1);
      // Beak
      ctx.fillStyle='#e85040';ctx.fillRect(bx+W-3,by+Math.floor(H*.45)+t,3,3);
      ctx.fillRect(bx+W-2,by+Math.floor(H*.35)+t,2,1);
      ctx.fillStyle='#ff7060';ctx.fillRect(bx+W-3,by+Math.floor(H*.45)+t,1,1);
      // Tail
      ctx.fillStyle='#f0a830';ctx.fillRect(bx,by+2+t,1,2);
    }
  },

  // ---- 1: CARDINAL — red with black mask, pointed crest ----
  {
    name:'CARDINAL',trail:'#ff5544',
    draw(bx,by,W,H,t,ff){
      // Body
      ctx.fillStyle='#dd3322';
      ctx.fillRect(bx+1,by+2+t,W-4,H-4);ctx.fillRect(bx+2,by+1+t,W-5,H-2);
      ctx.fillRect(bx+3,by+t,W-7,1);
      // Crest (spiky top)
      ctx.fillStyle='#ff4433';
      ctx.fillRect(bx+5,by-2+t,2,2);ctx.fillRect(bx+6,by-3+t,2,1);
      ctx.fillRect(bx+4,by-1+t,1,1);
      // Belly — darker red
      ctx.fillStyle='#aa2211';ctx.fillRect(bx+2,by+H-5+t,W-5,3);
      ctx.fillRect(bx+3,by+H-1+t,W-7,1);
      // Black face mask
      ctx.fillStyle='#222';
      ctx.fillRect(bx+W-8,by+3+t,6,3);ctx.fillRect(bx+W-7,by+2+t,4,1);
      ctx.fillRect(bx+W-7,by+6+t,3,1);
      // Eye (white on black mask)
      ctx.fillStyle='#fff';ctx.fillRect(bx+W-5,by+3+t,2,2);
      ctx.fillStyle='#111';ctx.fillRect(bx+W-4,by+3+t,1,1);
      // Beak — thick orange cone
      ctx.fillStyle='#ff8822';ctx.fillRect(bx+W-2,by+5+t,3,2);
      ctx.fillRect(bx+W-1,by+4+t,2,1);ctx.fillRect(bx+W-1,by+7+t,1,1);
      // Wing
      const wy=ff?-2:1;
      ctx.fillStyle='#bb2211';ctx.fillRect(bx,by+Math.floor(H*.35)+wy+t,Math.floor(W*.4),3);
      ctx.fillStyle='#881100';ctx.fillRect(bx,by+Math.floor(H*.35)+wy+2+t,Math.floor(W*.4),1);
      // Tail feathers — longer
      ctx.fillStyle='#cc2211';ctx.fillRect(bx-1,by+2+t,2,3);
      ctx.fillRect(bx-2,by+3+t,1,2);
    }
  },

  // ---- 2: PENGUIN — black & white, round, stubby ----
  {
    name:'PENGUIN',trail:'#aaccee',
    draw(bx,by,W,H,t,ff){
      // Black outer body
      ctx.fillStyle='#222233';
      ctx.fillRect(bx+1,by+2+t,W-4,H-4);ctx.fillRect(bx+2,by+1+t,W-5,H-2);
      ctx.fillRect(bx+3,by+t,W-7,1);ctx.fillRect(bx+3,by+H-1+t,W-7,1);
      // White belly (large)
      ctx.fillStyle='#eeeef4';
      ctx.fillRect(bx+4,by+3+t,W-8,H-5);ctx.fillRect(bx+5,by+2+t,W-10,1);
      ctx.fillRect(bx+5,by+H-2+t,W-10,1);
      // Eyes — big round white circles
      ctx.fillStyle='#fff';ctx.fillRect(bx+W-7,by+2+t,4,3);ctx.fillRect(bx+W-6,by+1+t,2,1);
      ctx.fillStyle='#111';ctx.fillRect(bx+W-5,by+3+t,1,1);
      // Beak — small orange
      ctx.fillStyle='#ff9930';ctx.fillRect(bx+W-3,by+5+t,2,2);
      ctx.fillRect(bx+W-2,by+4+t,1,1);
      // Flippers (instead of wings)
      const wy=ff?-1:1;
      ctx.fillStyle='#333344';ctx.fillRect(bx,by+4+wy+t,2,4);
      ctx.fillRect(bx-1,by+5+wy+t,1,2);
      // Feet
      ctx.fillStyle='#ff9930';ctx.fillRect(bx+4,by+H+t,2,1);ctx.fillRect(bx+W-6,by+H+t,2,1);
    }
  },

  // ---- 3: PARROT — green with striped chest, curved beak, rainbow tail ----
  {
    name:'PARROT',trail:'#44dd55',
    draw(bx,by,W,H,t,ff){
      // Green body
      ctx.fillStyle='#33bb44';
      ctx.fillRect(bx+1,by+2+t,W-4,H-4);ctx.fillRect(bx+2,by+1+t,W-5,H-2);
      ctx.fillRect(bx+3,by+t,W-7,1);ctx.fillRect(bx+3,by+H-1+t,W-7,1);
      // Lighter green head area
      ctx.fillStyle='#55dd55';ctx.fillRect(bx+W-8,by+1+t,5,5);
      // Striped chest — alternating light/dark bands
      ctx.fillStyle='#44cc44';ctx.fillRect(bx+3,by+4+t,W-8,1);
      ctx.fillStyle='#228822';ctx.fillRect(bx+3,by+6+t,W-8,1);
      ctx.fillStyle='#44cc44';ctx.fillRect(bx+3,by+8+t,W-8,1);
      // Belly
      ctx.fillStyle='#228822';ctx.fillRect(bx+2,by+H-4+t,W-5,2);
      // Eye — round with colored iris
      ctx.fillStyle='#fff';ctx.fillRect(bx+W-6,by+2+t,3,3);
      ctx.fillStyle='#111';ctx.fillRect(bx+W-5,by+3+t,1,1);
      ctx.fillStyle='#ffaa00';ctx.fillRect(bx+W-5,by+2+t,1,1); // golden iris
      // Curved beak — hooked
      ctx.fillStyle='#444';ctx.fillRect(bx+W-3,by+4+t,3,2);
      ctx.fillRect(bx+W-2,by+3+t,2,1);ctx.fillRect(bx+W-1,by+6+t,1,1);
      ctx.fillStyle='#555';ctx.fillRect(bx+W-3,by+4+t,1,1);
      // Wing
      const wy=ff?-2:1;
      ctx.fillStyle='#22aa33';ctx.fillRect(bx,by+Math.floor(H*.35)+wy+t,Math.floor(W*.4),3);
      ctx.fillStyle='#118822';ctx.fillRect(bx,by+Math.floor(H*.35)+wy+2+t,Math.floor(W*.4),1);
      // Rainbow tail feathers
      ctx.fillStyle='#ff3333';ctx.fillRect(bx-1,by+2+t,1,2);
      ctx.fillStyle='#ffaa00';ctx.fillRect(bx-2,by+3+t,1,2);
      ctx.fillStyle='#3388ff';ctx.fillRect(bx-1,by+5+t,1,2);
    }
  },

  // ---- 4: OWL — brown, big round eyes, ear tufts, spotted ----
  {
    name:'OWL',trail:'#c4956a',
    draw(bx,by,W,H,t,ff){
      // Brown body
      ctx.fillStyle='#8B6840';
      ctx.fillRect(bx+1,by+2+t,W-4,H-4);ctx.fillRect(bx+2,by+1+t,W-5,H-2);
      ctx.fillRect(bx+3,by+t,W-7,1);ctx.fillRect(bx+3,by+H-1+t,W-7,1);
      // Ear tufts
      ctx.fillStyle='#6B4820';
      ctx.fillRect(bx+W-8,by-1+t,2,2);ctx.fillRect(bx+W-4,by-1+t,2,2);
      ctx.fillRect(bx+W-7,by-2+t,1,1);ctx.fillRect(bx+W-3,by-2+t,1,1);
      // Face disc (lighter circle around eyes)
      ctx.fillStyle='#C4A060';
      ctx.fillRect(bx+W-9,by+2+t,7,5);ctx.fillRect(bx+W-8,by+1+t,5,1);
      ctx.fillRect(bx+W-8,by+7+t,5,1);
      // Big round eyes
      ctx.fillStyle='#fff';
      ctx.fillRect(bx+W-8,by+2+t,3,3);ctx.fillRect(bx+W-4,by+2+t,3,3);
      ctx.fillStyle='#ff8800';  // orange iris
      ctx.fillRect(bx+W-7,by+3+t,1,1);ctx.fillRect(bx+W-3,by+3+t,1,1);
      ctx.fillStyle='#111';     // pupil
      ctx.fillRect(bx+W-6,by+3+t,1,1);ctx.fillRect(bx+W-2,by+3+t,1,1);
      // Beak — tiny triangle
      ctx.fillStyle='#aa7733';ctx.fillRect(bx+W-5,by+5+t,2,2);
      ctx.fillStyle='#997722';ctx.fillRect(bx+W-4,by+5+t,1,1);
      // Spotted chest pattern
      ctx.fillStyle='#A08050';
      ctx.fillRect(bx+3,by+4+t,1,1);ctx.fillRect(bx+5,by+6+t,1,1);
      ctx.fillRect(bx+3,by+8+t,1,1);ctx.fillRect(bx+6,by+4+t,1,1);
      ctx.fillRect(bx+4,by+10+t,1,1);
      // Belly
      ctx.fillStyle='#6B4820';ctx.fillRect(bx+2,by+H-4+t,W-5,2);
      // Wings — wider, rounder
      const wy=ff?-2:1;
      ctx.fillStyle='#7B5830';ctx.fillRect(bx,by+3+wy+t,3,4);
      ctx.fillRect(bx-1,by+4+wy+t,1,2);
      ctx.fillStyle='#6B4820';ctx.fillRect(bx,by+6+wy+t,3,1);
      // Tail
      ctx.fillStyle='#6B4820';ctx.fillRect(bx,by+3+t,1,3);
    }
  },
];

let selectedBird=parseInt(localStorage.getItem('flappyBird')||'0',10);
if(selectedBird<0||selectedBird>=BIRDS.length)selectedBird=0;

// =============================================================
//  PALETTES
// =============================================================
const PAL={
  night:{
    sky:['#080a14','#0c0f20','#10152e','#1b1b3a','#2a2a5a','#3978a8','#4aa4d4','#6ab8d8'],
    hill1:'#1a2040',hill2:'#141830',hill3:'#1e1e3a',stars:true,
    grass1:'#1e6e1e',grass2:'#2d8a2a',grassDet:'#3da832',
    dirt1:'#5a3a1a',dirt2:'#3a2210',dirtDet:'#8a6030',
    pipeEdge:'#1e5c14',pipeFace:'#2d8a1e',pipeLit:'#5ecc47',pipeCap:'#247018',pipeCapLit:'#3db835',
    hudText:'#ffffff',hudShadow:'rgba(0,0,0,0.6)',tint:'rgba(0,0,0,0.06)',pageBg:'#0a0a18',
    sunMoon:'#dde8ff',sunGlow:'rgba(200,220,255,0.06)',
    bushDark:'#143018',bushMid:'#1e4820',bushLit:'#286828',
  },
  day:{
    sky:['#6a9cb8','#74a8c2','#7db0c8','#90bdd0','#a4cad8','#b8d6e0','#cce2e8','#daeaee'],
    hill1:'#5a9a60',hill2:'#4d8850',hill3:'#437844',stars:false,
    grass1:'#48964a',grass2:'#5aa85c',grassDet:'#72b874',
    dirt1:'#8e6840',dirt2:'#7a5434',dirtDet:'#a88458',
    pipeEdge:'#2a6e30',pipeFace:'#3c8e42',pipeLit:'#5aaa5e',pipeCap:'#347e38',pipeCapLit:'#4ca84e',
    hudText:'#ffffff',hudShadow:'rgba(0,0,0,0.35)',tint:'rgba(255,255,255,0.02)',pageBg:'#3a6a80',
    sunMoon:'#fff4b0',sunGlow:'rgba(255,240,150,0.08)',
    bushDark:'#3a7a3a',bushMid:'#4a9a48',bushLit:'#5ab858',
  }
};

let nightMode=localStorage.getItem('flappyTheme')==='night';
let themeBlend=nightMode?1:0,targetBlend=themeBlend,pal={};
function toggleTheme(){
  nightMode=!nightMode;targetBlend=nightMode?1:0;
  localStorage.setItem('flappyTheme',nightMode?'night':'day');
  document.getElementById('iconSun').style.display=nightMode?'block':'none';
  document.getElementById('iconMoon').style.display=nightMode?'none':'block';
}
document.getElementById('iconSun').style.display=nightMode?'block':'none';
document.getElementById('iconMoon').style.display=nightMode?'none':'block';
document.getElementById('themeBtn').addEventListener('touchstart',e=>e.stopPropagation(),{passive:false});

function lerpC(a,b,t){
  const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const r=Math.round(((pa>>16)&0xff)*(1-t)+((pb>>16)&0xff)*t);
  const g=Math.round(((pa>>8)&0xff)*(1-t)+((pb>>8)&0xff)*t);
  const bl=Math.round((pa&0xff)*(1-t)+(pb&0xff)*t);
  return '#'+((1<<24)|(r<<16)|(g<<8)|bl).toString(16).slice(1);
}
function updatePalette(){
  themeBlend+=(targetBlend-themeBlend)*0.04;
  if(Math.abs(themeBlend-targetBlend)<0.005)themeBlend=targetBlend;
  const d=PAL.day,n=PAL.night,t=themeBlend;
  pal.sky=d.sky.map((dc,i)=>lerpC(dc,n.sky[i],t));
  ['hill1','hill2','hill3','grass1','grass2','grassDet','dirt1','dirt2','dirtDet',
    'pipeEdge','pipeFace','pipeLit','pipeCap','pipeCapLit','hudText','hudShadow','pageBg',
    'sunMoon','sunGlow','bushDark','bushMid','bushLit'].forEach(k=>{
    if(d[k]&&d[k][0]==='#')pal[k]=lerpC(d[k],n[k],t);else pal[k]=t>0.5?n[k]:d[k];
  });
  pal.stars=t>0.3;pal.starAlpha=Math.max(0,(t-0.3)/0.7);
  pal.tint=t>0.5?n.tint:d.tint;document.body.style.background=pal.pageBg;
}

// =============================================================
//  FONT
// =============================================================
const FONT={
  '0':[0b01110,0b10011,0b10101,0b11001,0b01110],'1':[0b00100,0b01100,0b00100,0b00100,0b01110],
  '2':[0b01110,0b10001,0b00110,0b01000,0b11111],'3':[0b11110,0b00001,0b00110,0b00001,0b11110],
  '4':[0b10010,0b10010,0b11111,0b00010,0b00010],'5':[0b11111,0b10000,0b11110,0b00001,0b11110],
  '6':[0b01110,0b10000,0b11110,0b10001,0b01110],'7':[0b11111,0b00001,0b00010,0b00100,0b00100],
  '8':[0b01110,0b10001,0b01110,0b10001,0b01110],'9':[0b01110,0b10001,0b01111,0b00001,0b01110],
  'A':[0b01110,0b10001,0b11111,0b10001,0b10001],'B':[0b11110,0b10001,0b11110,0b10001,0b11110],
  'C':[0b01111,0b10000,0b10000,0b10000,0b01111],'D':[0b11110,0b10001,0b10001,0b10001,0b11110],
  'E':[0b11111,0b10000,0b11110,0b10000,0b11111],'F':[0b11111,0b10000,0b11110,0b10000,0b10000],
  'G':[0b01111,0b10000,0b10011,0b10001,0b01110],'H':[0b10001,0b10001,0b11111,0b10001,0b10001],
  'I':[0b01110,0b00100,0b00100,0b00100,0b01110],'J':[0b00111,0b00010,0b00010,0b10010,0b01100],
  'K':[0b10001,0b10010,0b11100,0b10010,0b10001],'L':[0b10000,0b10000,0b10000,0b10000,0b11111],
  'M':[0b10001,0b11011,0b10101,0b10001,0b10001],'N':[0b10001,0b11001,0b10101,0b10011,0b10001],
  'O':[0b01110,0b10001,0b10001,0b10001,0b01110],'P':[0b11110,0b10001,0b11110,0b10000,0b10000],
  'Q':[0b01110,0b10001,0b10101,0b10010,0b01101],'R':[0b11110,0b10001,0b11110,0b10010,0b10001],
  'S':[0b01111,0b10000,0b01110,0b00001,0b11110],'T':[0b11111,0b00100,0b00100,0b00100,0b00100],
  'U':[0b10001,0b10001,0b10001,0b10001,0b01110],'V':[0b10001,0b10001,0b10001,0b01010,0b00100],
  'W':[0b10001,0b10001,0b10101,0b10101,0b01010],'X':[0b10001,0b01010,0b00100,0b01010,0b10001],
  'Y':[0b10001,0b01010,0b00100,0b00100,0b00100],'Z':[0b11111,0b00010,0b00100,0b01000,0b11111],
  ' ':[0,0,0,0,0],':':[0,0b00100,0,0b00100,0],
  '!':[0b00100,0b00100,0b00100,0,0b00100],'-':[0,0,0b01110,0,0],
  '<':[0b00010,0b00100,0b01000,0b00100,0b00010],'>':[0b01000,0b00100,0b00010,0b00100,0b01000],
};
function drawText(text,x,y,sc,col,shadow){
  const chars=text.toUpperCase().split(''),cw=6*sc;
  let sx=(x===-1)?Math.floor((IW-chars.length*cw)/2):x;
  chars.forEach((ch,ci)=>{const g=FONT[ch];if(!g)return;
    for(let r=0;r<5;r++)for(let c=0;c<5;c++){if(g[r]&(1<<(4-c))){
      const px=sx+ci*cw+c*sc,py=y+r*sc;
      if(shadow){ctx.fillStyle=shadow;ctx.fillRect(px+sc,py+sc,sc,sc);}
      ctx.fillStyle=col;ctx.fillRect(px,py,sc,sc);
    }}
  });
}
function textWidth(text,sc){return text.length*6*sc;}

// =============================================================
//  AUDIO
// =============================================================
const AC=window.AudioContext||window.webkitAudioContext;let ac=null;
function initAudio(){if(!ac)ac=new AC()}
function snd(type){
  if(!ac)return;const t=ac.currentTime;
  if(type==='jump'){const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(700,t+0.06);g.gain.setValueAtTime(0.1,t);g.gain.linearRampToValueAtTime(0,t+0.1);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.1);}
  if(type==='score'){[660,880].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(f,t+i*0.07);g.gain.setValueAtTime(0.08,t+i*0.07);g.gain.linearRampToValueAtTime(0,t+i*0.07+0.12);o.connect(g).connect(ac.destination);o.start(t+i*0.07);o.stop(t+i*0.07+0.12);});}
  if(type==='hit'){const len=ac.sampleRate*0.15,b=ac.createBuffer(1,len,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);const s=ac.createBufferSource(),g=ac.createGain();s.buffer=b;g.gain.setValueAtTime(0.18,t);g.gain.linearRampToValueAtTime(0,t+0.15);s.connect(g).connect(ac.destination);s.start(t);}
  if(type==='over'){[440,370,310,260].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(f,t+i*0.15);g.gain.setValueAtTime(0.08,t+i*0.15);g.gain.linearRampToValueAtTime(0,t+i*0.15+0.14);o.connect(g).connect(ac.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.14);});}
  if(type==='select'){const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(500,t);o.frequency.linearRampToValueAtTime(600,t+0.04);g.gain.setValueAtTime(0.07,t);g.gain.linearRampToValueAtTime(0,t+0.06);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.06);}
}

// =============================================================
//  GAME STATE
// =============================================================
let state='start',score=0,best=parseInt(localStorage.getItem('flappy8best')||'0',10);
let frame=0,shakeX=0,shakeY=0,shakeDur=0,deathTimer=0,graceFrames=0,touchGuard=0;
let lastTime=0,dt=1;

// =============================================================
//  BIRD OBJECT
// =============================================================
const bird={
  x:0,y:0,w:0,h:0,vy:0,flapFrame:0,
  init(){this.x=BIRD_X;this.w=BIRD_W;this.h=BIRD_H;this.reset();},
  reset(){this.y=PLAY_H*0.35;this.vy=0;this.flapFrame=0;},
  flap(){this.vy=JVEL;this.flapFrame=8;snd('jump');},
  update(){this.vy+=GRAV*dt;this.y+=this.vy*dt;if(this.y<0){this.y=0;this.vy=0;}if(this.flapFrame>0)this.flapFrame-=dt;},
  draw(){
    const bx=Math.round(this.x),by=Math.round(this.y);
    const s=isPortrait?0.85:1;
    const W=Math.round(this.w*s),H=Math.round(this.h*s);
    const t=this.vy>1.5?2:this.vy>0.6?1:this.vy<-0.6?-1:0;
    BIRDS[selectedBird].draw(bx,by,W,H,t,this.flapFrame>0);
  },
  /** Draw specific bird at position (for selector) */
  drawBirdAt(bx,by,idx,ff){
    const s=isPortrait?0.85:1;
    const W=Math.round(this.w*s),H=Math.round(this.h*s);
    BIRDS[idx].draw(bx,by,W,H,0,ff);
  }
};

// ---- Particles ----
let particles=[];
function emitTrail(){if(frame%3!==0)return;particles.push({x:bird.x-1,y:bird.y+bird.h/2+Math.random()*4-2,life:1,size:1+Math.random(),col:BIRDS[selectedBird].trail});}
function updateParticles(){particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x-=PIPE_SPEED*0.5*dt;p.life-=0.04*dt;});}
function drawParticles(){particles.forEach(p=>{const hex=p.col||'#ffe066';const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);ctx.fillStyle=`rgba(${r},${g},${b},${p.life*0.4})`;ctx.fillRect(Math.round(p.x),Math.round(p.y),Math.ceil(p.size),Math.ceil(p.size));});}

// ---- Pipes ----
let pipes=[],pipeTimer=0;
function spawnPipe(){const minT=22,maxT=PLAY_H-GAP_SIZE-minT;pipes.push({x:IW+4,topH:minT+Math.floor(Math.random()*(maxT-minT)),scored:false});}
function drawPipe(px,py,pw,ph,isTop){const x=Math.round(px);if(ph<=0)return;ctx.fillStyle=pal.pipeFace;ctx.fillRect(x,py,pw,ph);ctx.fillStyle=pal.pipeEdge;ctx.fillRect(x,py,3,ph);ctx.fillRect(x+pw-3,py,3,ph);ctx.fillStyle=pal.pipeLit;ctx.fillRect(x+5,py,4,ph);ctx.fillStyle='rgba(0,0,0,0.07)';ctx.fillRect(x+pw-7,py,3,ph);ctx.fillStyle='rgba(0,0,0,0.05)';const sy=isTop?py+(ph%18):py;for(let ry=sy;ry<py+ph;ry+=18)ctx.fillRect(x+3,ry,pw-6,1);const cH=7,oh=4,cy=isTop?py+ph-cH:py;ctx.fillStyle=pal.pipeCap;ctx.fillRect(x-oh,cy,pw+oh*2,cH);ctx.fillStyle=pal.pipeCapLit;ctx.fillRect(x-oh+2,cy+1,4,cH-2);ctx.fillStyle=pal.pipeEdge;ctx.fillRect(x-oh,cy,pw+oh*2,1);ctx.fillRect(x-oh,cy+cH-1,pw+oh*2,1);ctx.fillRect(x-oh,cy,2,cH);ctx.fillRect(x+pw+oh-2,cy,2,cH);}

// =============================================================
//  BACKGROUND
// =============================================================
let bgLayers=[],stars=[],clouds=[],bushes=[];
function initBgData(){
  function gH(n,b,v){const a=[];for(let i=0;i<n;i++)a.push(b+Math.floor(Math.random()*v));return a;}
  bgLayers=[{off:0,spd:0.06,heights:gH(50,Math.floor(PLAY_H*.12),Math.floor(PLAY_H*.10))},{off:0,spd:0.12,heights:gH(50,Math.floor(PLAY_H*.07),Math.floor(PLAY_H*.08))},{off:0,spd:0.22,heights:gH(70,Math.floor(PLAY_H*.03),Math.floor(PLAY_H*.07))}];
  stars=Array.from({length:60},()=>({x:Math.floor(Math.random()*IW),y:Math.floor(Math.random()*PLAY_H*.45),s:Math.random()>.85?2:1,tw:Math.floor(Math.random()*80)}));
  clouds=Array.from({length:5+Math.floor(IW/100)},()=>({x:Math.floor(Math.random()*IW),y:Math.floor(PLAY_H*.08)+Math.floor(Math.random()*PLAY_H*.25),w:16+Math.floor(Math.random()*24),h:5+Math.floor(Math.random()*6),spd:0.03+Math.random()*0.06}));
  bushes=[];for(let i=0;i<Math.ceil(IW/20)+4;i++)bushes.push({x:i*20+Math.random()*10-5,w:8+Math.floor(Math.random()*14),h:5+Math.floor(Math.random()*8),type:Math.floor(Math.random()*3)});
}

function drawBg(){
  const sH=Math.ceil(PLAY_H/pal.sky.length);pal.sky.forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(0,i*sH,IW,sH+1);});
  const smX=isPortrait?IW-24:IW-40,smY=isPortrait?35:24;
  ctx.fillStyle=pal.sunGlow;ctx.fillRect(smX-12,smY-12,24,24);ctx.fillStyle=pal.sunMoon;
  ctx.fillRect(smX-6,smY-8,12,16);ctx.fillRect(smX-8,smY-6,16,12);ctx.fillRect(smX-7,smY-7,14,14);
  if(pal.stars&&pal.starAlpha>.3){ctx.fillStyle=pal.sky[1];ctx.fillRect(smX-3,smY-6,10,12);ctx.fillRect(smX-1,smY-7,8,14);ctx.fillRect(smX,smY-8,6,16);}
  if(!pal.stars){ctx.fillStyle=pal.sunMoon;ctx.fillRect(smX-1,smY-11,2,2);ctx.fillRect(smX-1,smY+9,2,2);ctx.fillRect(smX-11,smY-1,2,2);ctx.fillRect(smX+9,smY-1,2,2);ctx.fillRect(smX+7,smY-9,2,2);ctx.fillRect(smX-9,smY-9,2,2);ctx.fillRect(smX+7,smY+7,2,2);ctx.fillRect(smX-9,smY+7,2,2);}
  if(pal.stars){stars.forEach(s=>{if(((frame+s.tw)%60)<40){ctx.fillStyle=`rgba(255,255,255,${.7*pal.starAlpha})`;ctx.fillRect(s.x,s.y,s.s,s.s);}});}
  const cA=Math.max(.04,.12-themeBlend*.06);ctx.fillStyle=`rgba(255,255,255,${cA})`;
  clouds.forEach(cl=>{cl.x-=cl.spd*dt;if(cl.x+cl.w<-10)cl.x=IW+10;const cx=Math.floor(cl.x);ctx.fillRect(cx,cl.y,cl.w,cl.h);ctx.fillRect(cx+3,cl.y-2,cl.w-6,2);ctx.fillRect(cx+Math.floor(cl.w*.25),cl.y-4,Math.floor(cl.w*.5),2);ctx.fillRect(cx+1,cl.y+cl.h,cl.w-2,2);});
  const spd=(state==='playing')?PIPE_SPEED:.2;const hC=[pal.hill1,pal.hill2,pal.hill3];
  bgLayers.forEach((l,li)=>{if(state!=='gameover'&&state!=='dying')l.off+=l.spd*spd*dt;const sw=10,cnt=l.heights.length;ctx.fillStyle=hC[li];for(let i=0;i<Math.ceil(IW/sw)+2;i++){const idx=(i+Math.floor(l.off/sw))%cnt;ctx.fillRect(Math.floor(i*sw-(l.off%sw)),PLAY_H-l.heights[idx],sw,l.heights[idx]);}});
  const bo=(bgLayers[2].off*.8)%IW;
  bushes.forEach(b=>{let bx=Math.floor(b.x-bo%20);ctx.fillStyle=pal.bushDark;ctx.fillRect(bx,PLAY_H-b.h,b.w,b.h);ctx.fillStyle=pal.bushMid;ctx.fillRect(bx+1,PLAY_H-b.h,b.w-2,b.h-1);ctx.fillStyle=pal.bushLit;ctx.fillRect(bx+2,PLAY_H-b.h,Math.floor(b.w*.4),b.h-2);if(b.type===0){ctx.fillStyle=pal.bushMid;ctx.fillRect(bx+2,PLAY_H-b.h-2,b.w-4,2);}else if(b.type===1){ctx.fillStyle=pal.bushMid;ctx.fillRect(bx+1,PLAY_H-b.h-1,Math.floor(b.w*.5),1);ctx.fillRect(bx+Math.floor(b.w*.4),PLAY_H-b.h-2,Math.floor(b.w*.4),2);}});
}
let groundOff=0;
function drawGround(){const gy=PLAY_H;ctx.fillStyle=pal.grass2;ctx.fillRect(0,gy,IW,4);ctx.fillStyle=pal.grassDet;ctx.fillRect(0,gy,IW,2);ctx.fillStyle=pal.dirt1;ctx.fillRect(0,gy+4,IW,GROUND_H-4);ctx.fillStyle=pal.dirt2;ctx.fillRect(0,gy+GROUND_H-3,IW,3);const spd=(state==='playing')?PIPE_SPEED:.2;if(state!=='gameover'&&state!=='dying')groundOff=(groundOff+spd*dt)%10;ctx.fillStyle=pal.grass1;for(let i=-1;i<IW/10+2;i++){const gx=Math.floor(i*10-groundOff);ctx.fillRect(gx+3,gy,2,2);ctx.fillRect(gx+7,gy,1,1);}ctx.fillStyle=pal.dirtDet;for(let i=-1;i<IW/14+2;i++){const gx=Math.floor(i*14-groundOff*.4)%IW;ctx.fillRect(gx+3,gy+8,2,1);ctx.fillRect(gx+9,gy+15,1,1);}}

// =============================================================
//  HUD / SHAKE / COLLISION
// =============================================================
function drawHUD(){drawText(score.toString(),-1,isPortrait?14:10,isPortrait?2:3,pal.hudText,pal.hudShadow);}
function triggerShake(d){shakeDur=d;}
function updateShake(){if(shakeDur>0){shakeDur-=dt;shakeX=Math.floor((Math.random()-.5)*6);shakeY=Math.floor((Math.random()-.5)*6);}else{shakeX=0;shakeY=0;}}
function checkHit(){const bx=bird.x+3,by=bird.y+3,bw=bird.w-6,bh=bird.h-6;if(by+bh>=PLAY_H)return true;for(const p of pipes){if(bx+bw>p.x&&bx<p.x+PIPE_W){if(by<p.topH||by+bh>p.topH+GAP_SIZE)return true;}}return false;}
function checkScore(){for(const p of pipes){if(!p.scored&&p.x+PIPE_W<bird.x){p.scored=true;score++;snd('score');}}}

// =============================================================
//  GAME FLOW
// =============================================================
function startGame(){initAudio();state='playing';score=0;pipes=[];pipeTimer=-20;shakeDur=0;graceFrames=30;particles=[];lastTime=0;bird.init();}
function goToMenu(){state='start';pipes=[];particles=[];}
function die(){state='dying';deathTimer=0;snd('hit');setTimeout(()=>snd('over'),200);triggerShake(14);if(score>best){best=score;localStorage.setItem('flappy8best',best);}}

// =============================================================
//  INPUT
// =============================================================
let buttons=[];
function addButton(id,x,y,w,h,action){buttons.push({x,y,w,h,action});}
function toCC(cx,cy){const r=disp.getBoundingClientRect();return[(cx-r.left)/r.width*IW,(cy-r.top)/r.height*IH];}
function handleClick(cx,cy){
  for(const b of buttons){if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){b.action();return;}}
  if(state==='start'){startGame();bird.flap();}
  else if(state==='playing'){bird.flap();}
  else if(state==='gameover'){startGame();bird.flap();}
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleClick(-1,-1);}
  if(state==='start'){
    if(e.code==='ArrowLeft'){selectedBird=(selectedBird-1+BIRDS.length)%BIRDS.length;localStorage.setItem('flappyBird',selectedBird);initAudio();snd('select');}
    if(e.code==='ArrowRight'){selectedBird=(selectedBird+1)%BIRDS.length;localStorage.setItem('flappyBird',selectedBird);initAudio();snd('select');}
  }
});
disp.addEventListener('click',e=>{if(Date.now()-touchGuard<400)return;const[cx,cy]=toCC(e.clientX,e.clientY);handleClick(cx,cy);});
disp.addEventListener('touchstart',e=>{e.preventDefault();touchGuard=Date.now();const tc=e.touches[0];const[cx,cy]=toCC(tc.clientX,tc.clientY);handleClick(cx,cy);},{passive:false});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// =============================================================
//  BUTTON HELPER
// =============================================================
function drawButton(label,cx,y,sc,col,bgCol,action){
  const tw=textWidth(label,sc),pad=sc*2;
  const bw=tw+pad*2,bh=sc*5+pad*2,bx=cx-bw/2,by=y;
  ctx.fillStyle=bgCol;ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=col;ctx.fillRect(bx,by,bw,1);ctx.fillRect(bx,by+bh-1,bw,1);ctx.fillRect(bx,by,1,bh);ctx.fillRect(bx+bw-1,by,1,bh);
  drawText(label,Math.floor(bx+pad),Math.floor(by+pad),sc,col);
  addButton(label,bx,by,bw,bh,action);
}

// =============================================================
//  SCREENS
// =============================================================
function drawStartScreen(){
  const sc=isPortrait?2:3,sm=Math.max(1,sc-1);
  const mid=Math.floor(PLAY_H*.42);

  // Title
  drawText('FLAPPY BIRD',-1,mid-sc*16,sc,'#ffd740','rgba(80,50,0,0.5)');
  drawText('8-BIT ARCADE',-1,mid-sc*16+sc*6+6,sm,pal.sky[4]||'#90bdd0');

  // Bird preview — single bird, centered, with name
  const birdY=mid-4+Math.sin(frame*.06)*5;
  const birdX=Math.floor(IW/2-bird.w/2);
  bird.drawBirdAt(birdX,birdY,selectedBird,(frame%20<10));

  // Bird name
  drawText(BIRDS[selectedBird].name,-1,birdY+bird.h+6,sm,'#ffd740');

  // < > arrows beside bird
  const arrowPad=isPortrait?18:28;
  const arY=birdY+2;
  drawText('<',birdX-arrowPad,arY,sc,'#ffffff','rgba(0,0,0,0.2)');
  addButton('prevBird',birdX-arrowPad-4,arY-4,sc*6+8,sc*6+8,()=>{
    selectedBird=(selectedBird-1+BIRDS.length)%BIRDS.length;localStorage.setItem('flappyBird',selectedBird);initAudio();snd('select');
  });
  drawText('>',birdX+bird.w+arrowPad-sc*4,arY,sc,'#ffffff','rgba(0,0,0,0.2)');
  addButton('nextBird',birdX+bird.w+arrowPad-sc*4-4,arY-4,sc*6+8,sc*6+8,()=>{
    selectedBird=(selectedBird+1)%BIRDS.length;localStorage.setItem('flappyBird',selectedBird);initAudio();snd('select');
  });

  // Dots indicator
  const dotY=birdY+bird.h+sm*6+12;
  const dotW=BIRDS.length*6;
  const dotStart=Math.floor((IW-dotW)/2);
  BIRDS.forEach((_,i)=>{
    ctx.fillStyle=i===selectedBird?'#ffd740':'rgba(255,255,255,0.2)';
    ctx.fillRect(dotStart+i*6,dotY,3,3);
  });

  // Prompt
  const promptY=dotY+12;
  if((frame%60)<42){
    drawText('TAP OR PRESS',-1,promptY,sm,'#ffffff','rgba(0,0,0,0.25)');
    drawText('SPACE TO START',-1,promptY+sm*6+4,sm,'#a0a8c0');
  }
  if(best>0)drawText('BEST: '+best,-1,PLAY_H-14,sm,'#ffd740','rgba(80,50,0,0.4)');
}

function drawGameOverScreen(){
  ctx.fillStyle='rgba(8,8,18,0.55)';ctx.fillRect(0,0,IW,IH);
  ctx.fillStyle='rgba(0,0,0,0.05)';for(let y=0;y<IH;y+=2)ctx.fillRect(0,y,IW,1);

  const sc=isPortrait?2:3,sm=Math.max(1,sc-1);
  const y1=Math.floor(PLAY_H*.08),y2=Math.floor(PLAY_H*.28),y3=y2+sm*6+4;
  const y4=Math.floor(PLAY_H*.50),y5=y4+sm*6+6;

  if((frame%40)<28)drawText('GAME OVER',-1,y1,sc,'#ff4040','rgba(0,0,0,0.4)');
  drawText('SCORE',-1,y2,sm,'#b0b8d0');
  drawText(score.toString(),-1,y3,sc,'#ffd740','rgba(0,0,0,0.3)');
  drawText('BEST: '+best,-1,y4,sm,'#ffd740','rgba(0,0,0,0.3)');

  let rank,rC;
  if(score>=40){rank='S';rC='#ffd740';}else if(score>=25){rank='A';rC='#39ff14';}
  else if(score>=15){rank='B';rC='#00e5ff';}else if(score>=8){rank='C';rC='#b040ff';}
  else{rank='D';rC='#ff2d7b';}
  drawText('RANK: '+rank,-1,y5,sm,rC,'rgba(0,0,0,0.3)');

  const btnY=Math.floor(PLAY_H*.74),gap=isPortrait?6:12;
  const rW=textWidth('RETRY',sm)+sm*4,mW=textWidth('MENU',sm)+sm*4;
  const bS=Math.floor((IW-(rW+mW+gap))/2);
  drawButton('RETRY',bS+rW/2,btnY,sm,'#39ff14','rgba(57,255,20,0.1)',()=>{startGame();bird.flap();});
  drawButton('MENU',bS+rW+gap+mW/2,btnY,sm,'#ffffff','rgba(255,255,255,0.06)',goToMenu);
}

// =============================================================
//  MAIN LOOP
// =============================================================
function loop(timestamp){
  if(!lastTime)lastTime=timestamp;const elapsed=timestamp-lastTime;lastTime=timestamp;
  dt=Math.min(elapsed/16.667,3);if(dt<=0)dt=1;
  frame++;updateShake();updatePalette();if(!buf.width)applySize();
  buttons=[];
  ctx.clearRect(0,0,IW,IH);ctx.save();ctx.translate(shakeX,shakeY);drawBg();

  if(state==='start'){bird.init();drawGround();drawStartScreen();}
  if(state==='playing'){
    bird.update();emitTrail();updateParticles();pipeTimer+=dt;
    if(pipeTimer>=SPAWN_RATE){spawnPipe();pipeTimer=0;}
    pipes.forEach(p=>p.x-=PIPE_SPEED*dt);pipes=pipes.filter(p=>p.x>-PIPE_W-10);
    for(const p of pipes){drawPipe(p.x,0,PIPE_W,p.topH,true);drawPipe(p.x,p.topH+GAP_SIZE,PIPE_W,PLAY_H-p.topH-GAP_SIZE,false);}
    drawGround();drawParticles();bird.draw();drawHUD();
    if(checkHit()&&graceFrames<=0)die();if(graceFrames>0)graceFrames-=dt;checkScore();
  }
  if(state==='dying'){
    deathTimer+=dt;updateParticles();
    for(const p of pipes){drawPipe(p.x,0,PIPE_W,p.topH,true);drawPipe(p.x,p.topH+GAP_SIZE,PIPE_W,PLAY_H-p.topH-GAP_SIZE,false);}
    drawGround();drawParticles();bird.vy+=GRAV*dt;bird.y+=bird.vy*dt;
    if(bird.y+bird.h>=PLAY_H){bird.y=PLAY_H-bird.h;bird.vy=0;}bird.draw();drawHUD();
    if(deathTimer<4){ctx.fillStyle=`rgba(255,255,255,${.5-deathTimer*.12})`;ctx.fillRect(0,0,IW,IH);}
    if(deathTimer>40)state='gameover';
  }
  if(state==='gameover'){
    for(const p of pipes){drawPipe(p.x,0,PIPE_W,p.topH,true);drawPipe(p.x,p.topH+GAP_SIZE,PIPE_W,PLAY_H-p.topH-GAP_SIZE,false);}
    drawGround();bird.draw();drawGameOverScreen();
  }
  ctx.restore();ctx.fillStyle=pal.tint;for(let y=0;y<IH;y+=2)ctx.fillRect(0,y,IW,1);
  dCtx.clearRect(0,0,disp.width,disp.height);dCtx.drawImage(buf,0,0,disp.width,disp.height);
  requestAnimationFrame(loop);
}

applySize();bird.init();requestAnimationFrame(loop);
</script>
